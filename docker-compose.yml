# ============================================
# Stiman Dessert - Docker Compose (Production)
# ============================================
# Uses Supabase as cloud PostgreSQL - no local DB needed

services:
  # ---- Django Application ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: stiman-dessert-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=stimandessert.settings
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: stiman-dessert-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  media_data:
  static_data:
