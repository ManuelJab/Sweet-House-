{% extends 'base.html' %}
{% block title %}Eliminar Producto{% endblock %}
{% block content %}
<h1>Eliminar Producto</h1>
<p>¿Seguro que deseas eliminar "{{ producto.name }}"?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Sí, eliminar</button>
  <a href="{% url 'productos_list' %}">Cancelar</a>
</form>
{% endblock %}
